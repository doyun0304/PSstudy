name: Update README Table

on:
  push:
    paths:
      - 'BOJ/**.cpp' # BOJ 폴더 내 cpp 파일이 추가될 때만 실행

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Table Content
        run: |
          # 표의 헤더 생성
          echo "| 문제 번호 | 소스 코드 링크 |" > table.tmp
          echo "| :--- | :--- |" >> table.tmp
          
          # BOJ 폴더 내 파일들을 찾아서 표 형식으로 추가
          # 파일명에서 .cpp 제거 후 번호만 추출해 정렬
          find BOJ -name "*.cpp" | sort -V | while read file; do
            filename=$(basename "$file" .cpp)
            echo "| $filename | [풀이 보기](./$file) |" >> table.tmp
          done

      - name: Update README.md
        run: |
          # README.md에서 주석 사이의 내용을 새 표로 교체
          sed -i '//,//{//!d}' README.md
          sed -i '//r table.tmp' README.md
          rm table.tmp

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "docs: update problem list in README" || exit 0
          git push